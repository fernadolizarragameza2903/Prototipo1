<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot IA - Orientador Vocacional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 700px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 12px 0 12px 12px;
        }

        .message.bot .message-content {
            background: #e2e8f0;
            color: #1e293b;
            border-radius: 0 12px 12px 12px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 15px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #64748b;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-container {
            padding: 15px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 50px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .suggested-questions {
            padding: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .suggested-questions label {
            display: block;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .suggested-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggested-btn {
            padding: 6px 12px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            color: #475569;
        }

        .suggested-btn:hover {
            background: #f1f5ff;
            border-color: #667eea;
            color: #667eea;
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 90vh;
            }

            .message-content {
                max-width: 90%;
            }

            .input-field {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <h1>
                <i class="fas fa-robot"></i>
                Orientador IA
                <span class="status-dot"></span>
            </h1>
            <small>Disponible 24/7 para responder tus preguntas</small>
        </div>

        <!-- Mensajes -->
        <div class="messages-container" id="messagesContainer">
            <div class="message bot">
                <div class="message-content">
                    👋 ¡Hola! Soy tu Orientador IA. Estoy aquí para ayudarte a explorar carreras STEM y responder tus preguntas sobre orientación vocacional. ¿Por dónde comenzamos?
                </div>
            </div>
        </div>

        <!-- Preguntas Sugeridas -->
        <div class="suggested-questions" id="suggestedContainer">
            <label><i class="fas fa-lightbulb"></i> Preguntas Sugeridas:</label>
            <div class="suggested-buttons">
                <button class="suggested-btn" onclick="enviarPregunta('¿Qué carreras STEM son mejores para mí?')">
                    Carreras STEM
                </button>
                <button class="suggested-btn" onclick="enviarPregunta('¿Cuáles son las profesiones del futuro?')">
                    Profesiones del futuro
                </button>
                <button class="suggested-btn" onclick="enviarPregunta('¿Cómo estudiar programación?')">
                    Aprender programación
                </button>
                <button class="suggested-btn" onclick="enviarPregunta('¿Qué habilidades necesito?')">
                    Habilidades clave
                </button>
            </div>
        </div>

        <!-- Input -->
        <div class="input-container">
            <input 
                type="text" 
                class="input-field" 
                id="messageInput" 
                placeholder="Escribe tu pregunta..."
                onkeypress="if(event.key === 'Enter') enviarMensaje()"
            >
            <button class="send-btn" onclick="enviarMensaje()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // Base de conocimientos de la IA
        const knowledgeBase = {
            carreras: {
                palabras_clave: ['carrera', 'profesión', 'estudios', 'qué puedo'],
                respuesta: `Las principales carreras STEM son:
                
📱 **Tecnología**: Ingeniería de Software, Desarrollo Web, Ciberseguridad
🔬 **Ciencias**: Biología, Química, Física, Biotecnología
🏗️ **Ingeniería**: Civil, Mecánica, Industrial, Eléctrica
📊 **Datos**: Data Science, BI, Machine Learning

¿Te gustaría saber más de alguna en particular?`
            },
            programacion: {
                palabras_clave: ['programación', 'programar', 'código', 'python', 'javascript'],
                respuesta: `¡Excelente pregunta! Para aprender programación:

1️⃣ **Comienza con**: Python (fácil y versátil)
2️⃣ **Luego aprende**: JavaScript (web) o Java (empresarial)
3️⃣ **Recursos**: Codecademy, freeCodeCamp, Udemy
4️⃣ **Practica**: Crea proyectos propios
5️⃣ **Comunidad**: GitHub, Stack Overflow

¿Cuál lenguaje te gustaría aprender primero?`
            },
            futuro: {
                palabras_clave: ['futuro', 'empleos', 'demanda', 'mercado'],
                respuesta: `Las profesiones más demandadas en 2030 serán:

🤖 Inteligencia Artificial y Machine Learning (-40% desempleo)
☁️ Cloud Computing y DevOps
🔐 Ciberseguridad
📊 Data Analytics
🌱 Energías Renovables
🚀 Ingeniería Espacial

Las habilidades técnicas serán clave. ¿En cuál te gustaría especializarte?`
            },
            habilidades: {
                palabras_clave: ['habilidad', 'competencia', 'qué debo', 'como ser'],
                respuesta: `Las Top 5 Habilidades para STEM:

💡 **Pensamiento Lógico**: Resuelve problemas paso a paso
🎨 **Creatividad**: Innova en tus soluciones
🤝 **Trabajo en Equipo**: Colabora con otros
📊 **Análisis de Datos**: Interpreta información
💬 **Comunicación**: Explica tus ideas claramente

Puedes mejorar estas habilidades con práctica y proyectos.`
            },
            salario: {
                palabras_clave: ['salario', 'sueldo', 'dinero', 'gano'],
                respuesta: `Promedio de salarios iniciales en STEM:

💰 Ingeniero de Software: $$$$ (5,000-8,000 USD/mes)
💰 Data Scientist: $$$$ (6,000-9,000 USD/mes)  
💰 Ingeniero Civil: $$$ (3,000-5,000 USD/mes)
💰 Biólogo: $$$ (2,500-4,000 USD/mes)

Nota: Los salarios aumentan significativamente con experiencia.`
            },
            universidad: {
                palabras_clave: ['universidad', 'carrera', 'estudios', 'formación'],
                respuesta: `Para elegir universidad considera:

✅ Ranking académico
✅ Especializaciones disponibles
✅ Ubicación geográfica
✅ Costo
✅ Oportunidades de prácticas
✅ Conexiones con industria

¿Necesitas recomendaciones de universidades?`
            },
            cursos: {
                palabras_clave: ['curso', 'aprende', 'formación', 'taller', 'bootcamp'],
                respuesta: `Plataformas recomendadas para cursos:

📚 **Codificación**: Codecademy, Udemy, Coursera
📊 **Data**: DataCamp, Kaggle, Coursera
🔬 **Ciencias**: Coursera, EdX, Khan Academy
🏗️ **Ingeniería**: Coursera, MasterClass, YouTube
🎯 **Bootcamps**: General Assembly, DevBootcamp, Ironhack

¿Qué área te interesa más?`
            }
        };

        function encontrarRespuesta(mensaje) {
            const mensajeNormalizado = mensaje.toLowerCase();
            
            for (const [key, item] of Object.entries(knowledgeBase)) {
                for (const palabra of item.palabras_clave) {
                    if (mensajeNormalizado.includes(palabra)) {
                        return item.respuesta;
                    }
                }
            }
            
            // Respuesta por defecto amable
            return `Esa es una excelente pregunta. 🤔 

Aunque no tengo una respuesta específica en mis conocimientos, te recomiendo:

1. Hablar con docentes de tu colegio
2. Consultar con profesionales en tu área de interés
3. Realizar el test de orientación completo en VocaIA
4. Revisar información en nuestras secciones educativas

¿Hay algo más en lo que pueda ayudarte?`;
        }

        function enviarMensaje() {
            const input = document.getElementById('messageInput');
            const mensaje = input.value.trim();

            if (!mensaje) return;

            // Mostrar mensaje del usuario
            agregarMensaje(mensaje, 'user');
            input.value = '';

            // Simular indicador de escritura
            mostrarIndicadorEscritura();

            // Responder después de un tiempo
            setTimeout(() => {
                const respuesta = encontrarRespuesta(mensaje);
                agregarMensaje(respuesta, 'bot');
            }, 1500);
        }

        function enviarPregunta(pregunta) {
            document.getElementById('messageInput').value = pregunta;
            enviarMensaje();
        }

        function agregarMensaje(texto, tipo) {
            const container = document.getElementById('messagesContainer');
            
            // Remover indicador de escritura si existe
            const typing = container.querySelector('.message:last-child .typing-indicator');
            if (typing) {
                typing.parentElement.remove();
            }

            const div = document.createElement('div');
            div.className = `message ${tipo}`;
            div.innerHTML = `<div class="message-content">${texto}</div>`;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function mostrarIndicadorEscritura() {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `
                <div style="display: flex; gap: 4px; padding: 12px 15px; background: #e2e8f0; border-radius: 0 12px 12px 12px;">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Enfocar en el input al cargar
        window.addEventListener('load', () => {
            document.getElementById('messageInput').focus();
        });
    </script>
</body>
</html>
